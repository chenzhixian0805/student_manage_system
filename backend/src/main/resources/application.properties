# 应用配置
spring.application.name=student-management-backend
server.port=8080
server.address=0.0.0.0

# Web应用程序配置
spring.main.web-application-type=servlet
server.shutdown=IMMEDIATE

# 增加日志级别，便于调试
logging.level.org.springframework.boot.web=DEBUG
logging.level.org.springframework.boot.web.embedded=DEBUG
logging.level.org.springframework.web=DEBUG

# 数据库配置
spring.datasource.url=jdbc:mysql://localhost:3306/stusys?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA配置
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# 允许循环依赖
spring.main.allow-circular-references=true

# CORS配置
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET, POST, PUT, DELETE, OPTIONS
spring.web.cors.allowed-headers=*

# 字符编码配置
spring.http.encoding.charset=UTF-8
spring.http.encoding.force=true
spring.http.encoding.enabled=true

# 日志配置
logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.boot=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
# 禁用健康检查相关的自动配置
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.health.HealthContributorAutoConfiguration,
  org.springframework.boot.actuate.autoconfigure.health.HealthEndpointAutoConfiguration

# 启用Spring Boot的Web应用程序特性
spring.boot.web.server.auto-startup=true
spring.boot.web.servlet.context-path=/

# JWT配置
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=604800000
